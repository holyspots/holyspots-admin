name: bhagavadgita_admin
description: "Bhagavad-Gita Admin Panel"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.0

  # HTTP client
  dio: ^5.3.0

  # Navigation
  go_router: ^12.0.0

  # Environment variables
  flutter_dotenv: ^5.1.0

  # Local storage
  shared_preferences: ^2.2.0

  # File handling
  file_picker: ^6.0.0
  desktop_drop: ^0.4.4

  # Internationalization
  intl: ^0.20.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env

  fonts:
    - family: PTSans
      fonts:
        - asset: assets/fonts/PTSans-Regular.ttf
        - asset: assets/fonts/PTSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PTSans-Italic.ttf
          style: italic
